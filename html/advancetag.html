<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- DATA LIST Tag -->
     <label>food</label>
    <input list="food">

    <datalist id="food">

      <option value="pizza">
      <option value="burger">
      <option value="coke">
      <option value="beverage">
      <option value="ice cream">

    </datalist>

    <label>Location</label>
    <input list="city">

     <datalist id="city">

      <option value="mumbai">
      <option value="bangalore">
      <option value="chennai">
      <option value="delhi">
      <option value="hyderabad">

    </datalist>


</body>
</html>
